<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理中心</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--p:#667eea;--s:#10b981;--w:#f59e0b;--d:#ef4444}
*{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f3f4f6;min-height:100vh}
.navbar{background:linear-gradient(135deg,var(--p),#764ba2);padding:16px 24px}
.sidebar{background:white;min-height:calc(100vh - 64px);padding:16px 0;border-right:1px solid #e5e7eb}
.nav-item{padding:12px 20px;cursor:pointer;color:#6b7280;border-left:3px solid transparent}
.nav-item:hover{background:#f9fafb;color:var(--p)}
.nav-item.active{background:#f0f1ff;border-left-color:var(--p);font-weight:600;color:var(--p)}
.content{padding:20px}
.stat{background:white;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-icon.b{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.stat-icon.g{background:linear-gradient(135deg,#10b981,#059669);color:white}
.stat-icon.o{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.stat-icon.r{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.stat-val{font-size:26px;font-weight:700;color:#1f2937}
.stat-lbl{color:#6b7280;font-size:13px}
.badge{padding:4px 10px;border-radius:12px;font-size:12px}
.badge-s{background:#d1fae5;color:#065f46}.badge-w{background:#fef3c7;color:#92400e}.badge-d{background:#fee2e2;color:#991b1b}.badge-i{background:#dbeafe;color:#1e40af}
.progress{height:8px;border-radius:4px;background:#e5e7eb}
.progress-bar{background:linear-gradient(90deg,var(--p),#06b6d4);border-radius:4px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;color:#1f2937;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.btn{border-radius:8px;padding:8px 16px;font-weight:500}
.modal{background:rgba(0,0,0,.5)}.modal-content{border-radius:16px;border:none}
.form-control,.form-select{padding:10px 14px;border-radius:8px;border:1px solid #e5e7eb}
.table th{background:#f9fafb;padding:12px;font-weight:600;color:#374151;font-size:13px}
.table td{padding:12px;font-size:13px;border-bottom:1px solid #e5e7eb}
.tab{display:none}.tab.active{display:block}
.search-box{padding:10px 14px;border-radius:8px;border:1px solid #e5e7eb;width:100%;margin-bottom:12px}
.budget-bar{height:20px;background:#e5e7eb;border-radius:10px;overflow:hidden}
.budget-fill{height:100%;background:linear-gradient(90deg,var(--s),#06b6d4);border-radius:10px}
</style>
</head>
<body>
<nav class="navbar d-flex justify-content-between align-items-center">
<span style="font-size:24px">🏗️</span>
<div><h5 style="margin:0;color:white;font-weight:700">项目管理中心</h5></div>
<div><button class="btn btn-light btn-sm" onclick="showConfigModal()">⚙️</button> <button class="btn btn-danger btn-sm" onclick="logout()">退出</button></div>
</nav>
<div class="d-flex">
<div class="sidebar" style="width:180px">
<div class="nav-item active" onclick="switchTab('dashboard')">📊 数据概览</div>
<div class="nav-item" onclick="switchTab('projects')">📁 项目</div>
<div class="nav-item" onclick="switchTab('contracts')">📄 合同</div>
<div class="nav-item" onclick="switchTab('expenses')">💰 费用</div>
<div class="nav-item" onclick="switchTab('risks')">⚠️ 风险</div>
</div>
<div class="content" style="flex:1">
<div id="tab-dashboard" class="tab active">
<div class="row g-3 mb-3">
<div class="col-md-3"><div class="stat d-flex align-items-center"><div class="stat-icon b me-3">📁</div><div><div class="stat-val" id="statProjects">-</div><div class="stat-lbl">项目总数</div></div></div></div>
<div class="col-md-3"><div class="stat d-flex align-items-center"><div class="stat-icon g me-3">💵</div><div><div class="stat-val" id="statBudget">-</div><div class="stat-lbl">总预算(万)</div></div></div>
<div class="col-md-3"><div class="stat d-flex align-items-center"><div class="stat-icon o me-3">💸</div><div><div class="stat-val" id="statPaid">-</div><div class="stat-lbl">已付款(万)</div></div></div>
<div class="col-md-3"><div class="stat d-flex align-items-center"><div class="stat-icon r me-3">⚠️</div><div><div class="stat-val" id="statRisks">-</div><div class="stat-lbl">高风险</div></div></div>
</div>
<div class="row g-3">
<div class="col-md-6"><div class="card"><div class="card-title">📊 项目状态</div><div id="statusChart"></div></div></div>
<div class="col-md-6"><div class="card"><div class="card-title">💰 预算执行</div><div id="budgetChart"></div></div></div>
</div>
<div class="row g-3 mt-1"><div class="col-12"><div class="card"><div class="card-title">📈 各项目预算进度</div><div id="projectBudgets"></div></div></div></div>
</div>
<div id="tab-projects" class="tab">
<div class="d-flex justify-content-between align-items-center mb-2"><h6>📁 项目列表</h6><button class="btn btn-success btn-sm" onclick="showModal('project')">+ 新建</button></div>
<input type="text" class="search-box" placeholder="搜索..." oninput="searchProjects(this.value)">
<div id="projectList"></div>
</div>
<div id="tab-contracts" class="tab">
<div class="d-flex justify-content-between align-items-center mb-2"><h6>📄 合同列表</h6><button class="btn btn-success btn-sm" onclick="showModal('contract')">+ 添加</button></div>
<div class="card"><table class="table"><thead><tr><th>名称</th><th>项目</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody id="contractList"></tbody></table></div>
</div>
<div id="tab-expenses" class="tab">
<div class="d-flex justify-content-between align-items-center mb-2"><h6>💰 费用明细</h6><button class="btn btn-success btn-sm" onclick="showModal('expense')">+ 添加</button></div>
<div class="card"><table class="table"><thead><tr><th>名称</th><th>项目</th><th>金额</th><th>付款</th><th>操作</th></tr></thead><tbody id="expenseList"></tbody></table></div>
</div>
<div id="tab-risks" class="tab">
<div class="d-flex justify-content-between align-items-center mb-2"><h6>⚠️ 风险记录</h6><button class="btn btn-success btn-sm" onclick="showModal('risk')">+ 添加</button></div>
<div class="card"><table class="table"><thead><tr><th>名称</th><th>项目</th><th>等级</th><th>状态</th><th>操作</th></tr></thead><tbody id="riskList"></tbody></table></div>
</div>
</div></div>

<!-- Modals -->
<div class="modal" id="projectModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h6 class="modal-title" id="projectModalTitle">新建项目</h6><button class="btn-close btn-sm" onclick="hideModal('project')"></button></div>
<div class="modal-body">
<form id="projectForm" onsubmit="saveProject(event)">
<input type="hidden" id="projectId">
<div class="mb-2"><label class="form-label small">名称 *</label><input type="text" class="form-control" id="projectName" required></div>
<div class="mb-2"><label class="form-label small">地址</label><input type="text" class="form-control" id="projectAddress"></div>
<div class="row mb-2"><div class="col"><label class="form-label small">预算</label><input type="number" class="form-control" id="projectBudget"></div>
<div class="col"><label class="form-label small">类型</label><select class="form-select" id="projectType"></select></div></div>
<div class="row mb-2"><div class="col"><label class="form-label small">状态</label><select class="form-select" id="projectStatus"></select></div>
<div class="col"><label class="form-label small">风险</label><select class="form-select" id="riskLevel"></select></div></div>
<div class="row mb-2"><div class="col"><label class="form-label small">完工日期</label><input type="date" class="form-control" id="plannedEndDate"></div>
<div class="col"><label class="form-label small">进度%</label><input type="number" class="form-control" id="progress" value="0"></div></div>
<div class="text-end"><button type="button" class="btn btn-secondary btn-sm" onclick="hideModal('project')">取消</button> <button type="submit" class="btn btn-primary btn-sm">保存</button></div>
</form></div></div></div></div>

<div class="modal" id="contractModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h6 class="modal-title">添加合同</h6><button class="btn-close btn-sm" onclick="hideModal('contract')"></button></div>
<div class="modal-body">
<form onsubmit="saveContract(event)">
<input type="hidden" id="contractId">
<div class="mb-2"><label class="form-label small">项目 *</label><select class="form-select" id="contractProjectId" required></select></div>
<div class="mb-2"><label class="form-label small">名称 *</label><input type="text" class="form-control" id="contractName" required></div>
<div class="row mb-2"><div class="col"><label class="form-label small">类型</label><select class="form-select" id="contractType"><option value="设计">设计</option><option value="施工">施工</option><option value="监理">监理</option><option value="材料">材料</option></select></div>
<div class="col"><label class="form-label small">金额</label><input type="number" class="form-control" id="contractAmount"></div></div>
<div class="row mb-2"><div class="col"><label class="form-label small">甲方</label><input type="text" class="form-control" id="partyA"></div>
<div class="col"><label class="form-label small">乙方</label><input type="text" class="form-control" id="partyB"></div></div>
<div class="text-end"><button type="button" class="btn btn-secondary btn-sm" onclick="hideModal('contract')">取消</button> <button type="submit" class="btn btn-primary btn-sm">保存</button></div>
</form></div></div></div></div>

<div class="modal" id="expenseModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h6 class="modal-title">添加费用</h6><button class="btn-close btn-sm" onclick="hideModal('expense')"></button></div>
<div class="modal-body">
<form onsubmit="saveExpense(event)">
<input type="hidden" id="expenseId">
<div class="mb-2"><label class="form-label small">项目 *</label><select class="form-select" id="expenseProjectId" required></select></div>
<div class="mb-2"><label class="form-label small">名称 *</label><input type="text" class="form-control" id="expenseName" required></div>
<div class="row mb-2"><div class="col"><label class="form-label small">类型</label><select class="form-select" id="expenseType"><option value="设计费">设计费</option><option value="施工费">施工费</option><option value="监理费">监理费</option><option value="材料费">材料费</option></select></div>
<div class="col"><label class="form-label small">金额</label><input type="number" class="form-control" id="expenseAmount"></div></div>
<div class="row mb-2"><div class="col"><label class="form-label small">发票</label><select class="form-select" id="invoiceStatus"><option value="未开">未开</option><option value="已开">已开</option></select></div>
<div class="col"><label class="form-label small">付款</label><select class="form-select" id="paymentStatus"><option value="未付">未付</option><option value="部分付款">部分付款</option><option value="已付清">已付清</option></select></div></div>
<div class="text-end"><button type="button" class="btn btn-secondary btn-sm" onclick="hideModal('expense')">取消</button> <button type="submit" class="btn btn-primary btn-sm">保存</button></div>
</form></div></div></div></div>

<div class="modal" id="riskModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h6 class="modal-title">添加风险</h6><button class="btn-close btn-sm" onclick="hideModal('risk')"></button></div>
<div class="modal-body">
<form onsubmit="saveRisk(event)">
<input type="hidden" id="riskId">
<div class="mb-2"><label class="form-label small">项目 *</label><select class="form-select" id="riskProjectId" required></select></div>
<div class="mb-2"><label class="form-label small">名称 *</label><input type="text" class="form-control" id="riskName" required></div>
<div class="row mb-2"><div class="col"><label class="form-label small">等级</label><select class="form-select" id="riskLevel2"><option value="低">低</option><option value="中">中</option><option value="高">高</option></select></div>
<div class="col"><label class="form-label small">状态</label><select class="form-select" id="riskStatus"><option value="待处理">待处理</option><option value="处理中">处理中</option><option value="已解决">已解决</option></select></div></div>
<div class="mb-2"><label class="form-label small">措施</label><input type="text" class="form-control" id="riskMitigation"></div>
<div class="text-end"><button type="button" class="btn btn-secondary btn-sm" onclick="hideModal('risk')">取消</button> <button type="submit" class="btn btn-primary btn-sm">保存</button></div>
</form></div></div></div></div>

<div class="modal" id="configModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h6 class="modal-title">⚙️ 系统配置</h6><button class="btn-close btn-sm" onclick="hideModal('config')"></button></div>
<div class="modal-body">
<div class="mb-2"><label class="form-label small">项目状态(每行一个)</label><textarea class="form-control" id="configStatus" rows="3"></textarea></div>
<div class="mb-2"><label class="form-label small">风险等级</label><textarea class="form-control" id="configRisk" rows="2"></textarea></div>
<div class="text-end"><button class="btn btn-success btn-sm" onclick="saveConfig()">保存</button></div>
</div></div></div></div>

<script>
const URL="https://ymrhorxtglbsoccpxnwv.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inltcmhvcnh0Z2xic29jY3B4bnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTgxNjUsImV4cCI6MjA4OTc5NDE2NX0.wav36aWORPcWOhX33ga73puQf3b3ofxHbXD2vB6myoA";
const H={apikey:KEY,Authorization:"Bearer "+KEY,ContentType:"application/json",Prefer:"return=representation"};
let C={status:[],risk:[],type:[]},PJ=[],ex=[];

async function loadConfig(){
  let r=await fetch(URL+"/rest/v1/app_config?select=config_key,config_value",{headers:H});
  let d=await r.json();
  d.forEach(i=>C[i.config_key]=i.config_value);
  document.getElementById("configStatus").value=C.status.join("\n");
  document.getElementById("configRisk").value=C.risk.join("\n");
  updateSelects();
}

async function saveConfig(){
  C.status=document.getElementById("configStatus").value.split("\n").filter(x=>x.trim());
  C.risk=document.getElementById("configRisk").value.split("\n").filter(x=>x.trim());
  for(let[k,v]of Object.entries(C)){
    await fetch(URL+"/rest/v1/app_config?config_key=eq."+k,{method:"PATCH",headers:{...H,"Prefer":"return=minimal"},body:JSON.stringify({config_value:v,updated_at:new Date().toISOString()})});
  }
  updateSelects();alert("配置已保存");hideModal('config');
}

function updateSelects(){
  document.getElementById("projectStatus").innerHTML=C.status.map(s=>'<option value="'+s+'">'+s+'</option>').join("");
  document.getElementById("riskLevel").innerHTML=C.risk.map(r=>'<option value="'+r+'">'+r+'</option>').join("");
  document.getElementById("riskLevel2").innerHTML=C.risk.map(r=>'<option value="'+r+'">'+r+'</option>').join("");
  document.getElementById("projectType").innerHTML='<option value="">请选择</option>'+C.type.map(t=>'<option value="'+t+'">'+t+'</option>').join("");
  let pjOpts='<option value="">请选择</option>'+PJ.map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join("");
  document.getElementById("contractProjectId").innerHTML=pjOpts;
  document.getElementById("expenseProjectId").innerHTML=pjOpts;
  document.getElementById("riskProjectId").innerHTML=pjOpts;
}

function logout(){localStorage.removeItem("pm_in");location.href="index.html";}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.querySelectorAll(".nav-item").forEach(e=>e.classList.remove("active"));
  event.target.classList.add("active");
  if(tab==='dashboard')updateDashboard();
}

async function loadAll(){
  await Promise.all([loadProjects(),loadContracts(),loadExpenses(),loadRisks()]);
  updateDashboard();
}

async function updateDashboard(){
  let total=PJ.length,budget=PJ.reduce((s,p)=>s+(p.budget||0),0)/10000;
  let highRisk=PJ.filter(p=>p.risk_level==="高").length;
  let paid=ex.filter(e=>e.payment_status==="已付清").reduce((s,e)=>s+(e.amount||0),0)/10000;
  document.getElementById("statProjects").textContent=total;
  document.getElementById("statBudget").textContent=budget.toFixed(0);
  document.getElementById("statPaid").textContent=paid.toFixed(0);
  document.getElementById("statRisks").textContent=highRisk;
  
  let sc={};C.status.forEach(s=>sc[s]=0);PJ.forEach(p=>sc[p.status]=(sc[p.status]||0)+1);
  let cl=['badge-i','badge-s','badge-w','badge-secondary'];
  document.getElementById("statusChart").innerHTML=C.status.map((s,i)=>'<span class="badge '+cl[i%4]+'" style="margin:3px">'+s+': '+(sc[s]||0)+'</span>').join("")||'<small class="text-muted">暂无数据</small>';
  
  let rate=budget>0?(paid/budget*100).toFixed(1):0;
  document.getElementById("budgetChart").innerHTML='<div class="d-flex justify-content-between mb-1"><small>预算: ¥'+budget.toFixed(1)+'万</small><small>已付: ¥'+paid.toFixed(1)+'万</small></div><div class="budget-bar mb-1"><div class="budget-fill" style="width:'+rate+'%"></div></div><small class="text-muted">执行率: '+rate+'%</small>';
  
  let pbHtml="";
  for(let p of PJ.slice(0,5)){
    let pe=ex.filter(e=>e.project_id===p.id);
    let pPaid=pe.filter(e=>e.payment_status==="已付清").reduce((s,e)=>s+(e.amount||0),0);
    let pBudget=p.budget||0;
    let pRate=pBudget>0?Math.min(100,pPaid/pBudget*100).toFixed(1):0;
    pbHtml+='<div class="mb-2"><div class="d-flex justify-content-between"><small>'+p.name+'</small><small>¥'+(pPaid/10000).toFixed(1)+'万 / ¥'+(pBudget/10000).toFixed(1)+'万</small></div><div class="budget-bar"><div class="budget-fill" style="width:'+pRate+'%"></div></div></div>';
  }
  document.getElementById("projectBudgets").innerHTML=pbHtml||'<small class="text-muted">暂无项目</small>';
}

async function loadProjects(){
  let r=await fetch(URL+"/rest/v1/projects?select=*&order=created_at.desc",{headers:H});
  PJ=await r.json();
  renderProjects(PJ);
  updateSelects();
}

function renderProjects(list){
  let html=list.map(p=>'<div class="card mb-2"><div class="d-flex justify-content-between align-items-start"><div><strong>'+p.name+'</strong><br><small class="text-muted">📍 '+(p.address||'地址待定')+'</small></div><span class="badge badge-'+(p.status==='已完成'?'s':p.status==='施工中'?'i':'w')+'">'+(p.status||'待定')+'</span></div><div class="progress mt-2 mb-1"><div class="progress-bar" style="width:'+(p.progress||0)+'%"></div></div><div class="d-flex justify-content-between"><small class="text-muted">¥'+(p.budget||0).toLocaleString()+'</small><div><span class="badge badge-'+(p.risk_level==='高'?'d':p.risk_level==='中'?'w':'s')+'">'+p.risk_level+'</span> <button class="btn btn-xs btn-outline-primary btn-sm" onclick="editProject(\''+p.id+'\')">编辑</button> <button class="btn btn-xs btn-outline-danger btn-sm" onclick="delProject(\''+p.id+'\')">删除</button></div></div></div>').join("");
  document.getElementById("projectList").innerHTML=html||'<div class="text-center text-muted p-4">暂无项目</div>';
}

function searchProjects(kw){
  let filtered=PJ.filter(p=>p.name.toLowerCase().includes(kw.toLowerCase()));
  renderProjects(filtered);
}

async function loadContracts(){
  let r=await fetch(URL+"/rest/v1/contracts?select=*,projects:project_id(name)",{headers:H});
  let d=await r.json();
  let html=d.map(c=>'<tr><td>'+c.contract_name+'</td><td>'+(c.projects?.name||'-')+'</td><td>¥'+(c.contract_amount||0).toLocaleString()+'</td><td>'+(c.status||'草稿')+'</td><td><button class="btn btn-sm btn-outline-primary" onclick="editContract(\''+c.id+'\')">编辑</button> <button class="btn btn-sm btn-outline-danger" onclick="delContract(\''+c.id+'\')">删除</button></td></tr>').join("");
  document.getElementById("contractList").innerHTML=html||'<tr><td colspan="5" class="text-center text-muted">暂无合同</td></tr>';
}

async function loadExpenses(){
  let r=await fetch(URL+"/rest/v1/expenses?select=*,projects:project_id(name)",{headers:H});
  ex=await r.json();
  let html=ex.map(e=>'<tr><td>'+e.expense_name+'</td><td>'+(e.projects?.name||'-')+'</td><td>¥'+(e.amount||0).toLocaleString()+'</td><td class="'+(e.payment_status==='已付清'?'text-success':'')+'">'+(e.payment_status||'未付')+'</td><td><button class="btn btn-sm btn-outline-primary" onclick="editExpense(\''+e.id+'\')">编辑</button> <button class="btn btn-sm btn-outline-danger" onclick="delExpense(\''+e.id+'\')">删除</button></td></tr>').join("");
  document.getElementById("expenseList").innerHTML=html||'<tr><td colspan="5" class="text-center text-muted">暂无费用</td></tr>';
}

async function loadRisks(){
  let r=await fetch(URL+"/rest/v1/risks?select=*,projects:project_id(name)",{headers:H});
  let d=await r.json();
  let html=d.map(rk=>'<tr><td>'+rk.risk_name+'</td><td>'+(rk.projects?.name||'-')+'</td><td><span class="badge badge-'+(rk.risk_level==='高'?'d':rk.risk_level==='中'?'w':'s')+'">'+rk.risk_level+'</span></td><td>'+(rk.status||'待处理')+'</td><td><button class="btn btn-sm btn-outline-primary" onclick="editRisk(\''+rk.id+'\')">编辑</button> <button class="btn btn-sm btn-outline-danger" onclick="delRisk(\''+rk.id+'\')">删除</button></td></tr>').join("");
  document.getElementById("riskList").innerHTML=html||'<tr><td colspan="5" class="text-center text-muted">暂无风险</td></tr>';
}

function showModal(t){
  if(t==="project"){document.getElementById("projectForm").reset();document.getElementById("projectId").value="";document.getElementById("projectModalTitle").textContent="新建项目";}
  if(t==="contract"){document.getElementById("contractForm")?.reset();document.getElementById("contractId").value="";}
  if(t==="expense"){document.getElementById("expenseForm")?.reset();document.getElementById("expenseId").value="";}
  if(t==="risk"){document.getElementById("riskForm")?.reset();document.getElementById("riskId").value="";}
  let m=document.getElementById(t+"Modal");
  m.classList.add("show");
  m.style.display="flex";
}
function hideModal(t){let m=document.getElementById(t+"Modal");m.classList.remove("show");m.style.display="none";}
