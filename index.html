<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 项目管理中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
  animation: rotate 20s linear infinite;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.login-container {
  position: relative;
  width: 420px;
  padding: 48px;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 24px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 36px;
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.logo h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 8px;
}
.logo p {
  color: #6b7280;
  font-size: 14px;
}
.form-group {
  margin-bottom: 24px;
}
.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #374151;
  font-size: 14px;
}
.form-group input {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 16px;
  transition: all 0.3s;
  background: #f9fafb;
}
.form-group input:focus {
  outline: none;
  border-color: #667eea;
  background: #fff;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
}
.error-msg {
  background: #fee2e2;
  color: #dc2626;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 16px;
  display: none;
  animation: shake 0.5s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
.btn-login {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
}
.btn-login:active {
  transform: translateY(0);
}
.footer {
  text-align: center;
  margin-top: 24px;
  color: #9ca3af;
  font-size: 12px;
}
.features {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
}
.feature {
  text-align: center;
  color: #6b7280;
  font-size: 12px;
}
.feature span {
  font-size: 20px;
  display: block;
  margin-bottom: 4px;
}
</style>
</head>
<body>
<div class="login-container">
<div class="logo">
  <div class="logo-icon">🏗️</div>
  <h1>项目管理中心</h1>
  <p>Project Management System</p>
</div>
<div class="error-msg" id="errorMsg">密码错误，请重试</div>
<form onsubmit="doLogin(event)">
  <div class="form-group">
    <label>访问密码</label>
    <input type="password" id="password" placeholder="请输入访问密码" required>
  </div>
  <button type="submit" class="btn-login">登 录</button>
</form>
<div class="footer">
  <p>请输入密码访问系统</p>
</div>
</div>
<script>
const PWD = "admin123";
function doLogin(e) {
  e.preventDefault();
  if(document.getElementById("password").value === PWD) {
    localStorage.setItem("pm_in", "y");
    location.href = "index.html";
  } else {
    document.getElementById("errorMsg").style.display = "block";
  }
}
if(localStorage.getItem("pm_in") === "y") {
  location.href = "index.html";
}
</script>
</body>
</html>
